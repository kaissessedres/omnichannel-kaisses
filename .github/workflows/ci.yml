name: CI

# Roda a suíte do bridge e o build do PWA a cada push na main e em todo PR.
# Antes não havia CI — a suíte (node --test) só rodava na mão; isto garante
# que um commit que quebre os testes ou o build do web/ apareça na hora.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  bridge:
    name: Testes do bridge (npm test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20 # casa com o Dockerfile (node:20-alpine) e engines >=20
          cache: npm
      - run: npm ci
      - run: npm test

  web:
    name: Testes + build do PWA (web/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm test
        working-directory: web
      - run: npm run build
        working-directory: web
