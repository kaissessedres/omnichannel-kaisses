# KaiChat — Oracle Cloud Always Free
# Todos os serviços rodam num único VM ARM (A1 Flex: 4 OCPUs, 24GB RAM)
#
# Acesso público (via nginx):
#   http://IP/           → Libredesk (painel do lojista)
#   http://IP:8080/      → Evolution API (só para setup do QR code)
#
# Comunicação interna (Docker network, sem exposição pública):
#   bridge → libredesk:9000
#   bridge → evolution:8080
#   evolution → bridge:3000  (webhook de mensagens recebidas)
#   libredesk → bridge:3000  (webhook de replies do lojista)

services:

  # ── Banco de dados do Libredesk ─────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: libredesk
      POSTGRES_USER: libredesk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U libredesk"]
      interval: 10s
      retries: 5

  # ── Cache do Libredesk ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  # ── Libredesk — inbox omnichannel ───────────────────────────────
  # Imagem oficial: https://github.com/abhinavxd/libredesk/pkgs/container/libredesk
  # Verificar nome exato da imagem no repositório antes do primeiro deploy.
  libredesk:
    image: ghcr.io/abhinavxd/libredesk:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: libredesk
      DB_USER: libredesk
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379
      APP_PORT: 9000
    volumes:
      - libredesk_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/health || exit 1"]
      interval: 15s
      retries: 5

  # ── Evolution API — sessão WhatsApp ────────────────────────────
  # Imagem oficial: https://github.com/EvolutionAPI/evolution-api
  evolution:
    image: atendai/evolution-api:latest
    restart: unless-stopped
    environment:
      # Auth
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      # Webhook aponta para o bridge (rede interna Docker)
      WEBHOOK_GLOBAL_URL: http://bridge:3000/webhook/evolution
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_GLOBAL_EVENTS_MESSAGES_UPDATE: "false"
      WEBHOOK_GLOBAL_EVENTS_CONNECTION_UPDATE: "true"
      # Armazenamento de sessão
      STORE_MESSAGES: "true"
      STORE_MESSAGE_UP: "true"
      # Server
      SERVER_PORT: 8080
    volumes:
      - evolution_data:/evolution/instances
    ports:
      - "8080:8080"   # exposto para acesso ao QR code — fechar após setup se quiser

  # ── Bridge Service — este repositório ──────────────────────────
  bridge:
    build: .
    restart: unless-stopped
    depends_on:
      - libredesk
      - evolution
    env_file:
      - .env
    environment:
      # Override das URLs para usar rede interna Docker
      LIBREDESK_URL: http://libredesk:9000
      EVOLUTION_API_URL: http://evolution:8080
    volumes:
      - bridge_data:/app/data

  # ── Nginx — reverse proxy público ───────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - libredesk
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"

volumes:
  postgres_data:
  redis_data:
  libredesk_data:
  evolution_data:
  bridge_data:
